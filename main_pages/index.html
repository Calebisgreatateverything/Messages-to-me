<!DOCTYPE html>

<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="manifest" href="../manifest.json">
        
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 100vh;
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #01042c;
                color: white;
            }

            #title-cont {
                text-align: center;
                margin-bottom: 50px;
                margin-top: 20px;
                width: 90%;
            }

            #title {
                font-size: 2.75em;
                margin: 0;
            }

            #description {
                font-size: 1.1em;
                margin-top: 7px;
                color: #4f86d9;
                width: 95%;
                text-align: center;
            }

            #text_cont {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 90%;
            }

            #messageInput {
                width: 85%;
                height: 150px;
                padding: 10px;
                font-size: 1em;
                border-radius: 5px;
                border: none;
                margin-bottom: 20px;
                resize: none;
            }

            #sendButton {
                padding: 10px 20px;
                font-size: 1em;
                border-radius: 5px;
                border: none;
                background-color: #0a42ab;
                color: white;
                cursor: pointer;
                width: 85%;
            }
        </style>
    </head>
    <body>
        <div id="title-cont">
            <h1 id="title">Message Sender</h1>
            <p id="description">I might take a while to respond to my messages, so deliver urgent messages here.</p>
        </div>

        <div id="text_cont">
            <textarea id="messageInput" placeholder="Type your message here..."></textarea>
            <button id="sendButton">Send Message</button>
        </div>

        <script>
            document.getElementById("sendButton").onclick = async () => {
                const msg = document.getElementById("messageInput").value;

                if (!msg.trim()) return;

                const response = await fetch("https://pushnotifs.kuhncaleb98.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });

                if (response.ok) {
                    alert("Message sent!");
                } else {
                    alert("Error sending message.");
                }
            };
        </script>
    </body>
</html>
